## 2) `configs/params.yaml`

```yaml
project:
  random_seed: 42

data_generation:
  start_date: "2024-01-01"
  num_days: 365
  num_skus: 30

  categories: ["A", "B", "C"]
  category_mix: [0.5, 0.3, 0.2]

  # Demand patterns
  weekly_seasonality_strength: 0.25     # affects day-of-week pattern
  yearly_seasonality_strength: 0.20     # affects annual sinusoid
  noise_cv: 0.20                        # coefficient of variation of noise

  # Price / promo
  base_price_range: [8.0, 30.0]
  price_volatility: 0.06                # daily lognormal volatility
  promo_probability: 0.10               # probability of promo per day
  promo_lift_range: [0.10, 0.60]        # demand lift on promo days
  price_elasticity_range: [-2.0, -0.3]  # negative elasticity

  # Inventory + replenishment behavior (simulation)
  initial_on_hand_range: [50, 200]
  lead_time_days_range: [2, 10]
  review_period_days: 7                # orders are placed every N days
  target_days_of_cover_range: [10, 25] # heuristic order-up-to target
  stockout_penalty_enabled: true       # realized sales capped by on-hand

outputs:
  sales_file: "sales.csv"
  inventory_file: "inventory.csv"
  leadtime_file: "leadtime.csv"
  sku_master_file: "sku_master.csv"
